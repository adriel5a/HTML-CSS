<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>links</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        a{
            color: red;
            text-decoration: none;
            font-weight: bolder;
        } a:visited{
            color: darkblue ;
        } 
        a:hover{
            text-decoration: underline ;
            color: black;
        }
        a:active{
            color: yellow;
        }
        a::after{
            content:'[ link]';
            text-decoration: none;
            font-weight:  normal;
            color: darkgray;
        }
    </style>
</head>
<body>
 <h1>personalizando links</h1>  
 <ul>

    <li><a href="https://www.youtube.com/@pctheone">canal do youtube do PC</a></li>
    <li> <a href="https://souzadev.com.br/welcome">site do mentoria do Souza</a></li>
 </ul> 
</body>
</html>
