<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>midias em html 5</title>
</head>
<body>
 <h1>imagens dinamicas</h1>   
 <p>tenetr abrir esse site em varios dispovisitos diferentes ou simplesmente diminua ou aumente o tamanho do seu navegado</p> 

 <picture>
    <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
    <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
    <img src="imagens/foto-g.png" alt="imagens flexivel">
 </picture>
 <h1>reproduzindo audio </h1>
 <p>vamos aprender a repriduzi audio em html5</p>
 <audio preload="metadata" autoplay controls
  src="midia/Big Decisions - Jeremy Korpas.mp3"></audio>
</body>
</html>
